<script>
"use strict";

/* =====================================================================
   IF PENGUINS COULD FLY  —  v2
   ---------------------------------------------------------------------
   Hold (tap / click / spacebar) to climb. Release to drop.
   Fly through the hole in each ring. Grab fish 🐟 for points, snag
   power-ups, dodge hazards, and
   ride through changing skies. Press M to mute.

   *** TUNING ZONE ***  All feel lives in CONFIG. Everything is sized as
   a fraction of screen height (H) so it plays the same on phone, laptop,
   and desktop. Nothing here needs touching — bump numbers only if you
   want to change the feel.
   ===================================================================== */
const CONFIG = {
  // --- Penguin physics (screen-heights per second / per second²) ---
  gravity:     1.35,   // how hard the plane falls when you let go (lower = floatier)
  lift:        3.4,    // upward pull while you HOLD (lower = gentler, less twitchy)
  drag:        2.2,    // air resistance: higher = more glide/float, less snappy fall
  maxFall:     0.78,   // terminal dive speed
  maxClimb:    0.82,   // top climb speed
  sideAccel:   1.75,   // left/right steering acceleration
  sideDrag:    4.2,    // steering settles quickly when released
  maxSide:     0.48,   // maximum horizontal speed
  playerMinX:  0.12,   // safe steering bounds
  playerMaxX:  0.62,

  // --- Ring scrolling / difficulty ---
  startSpeed:  0.42,   // starting scroll speed (screen-heights / sec)
  maxSpeed:    0.95,   // speed cap
  speedRamp:   0.02,   // speed added per ring passed
  ringSpacing: 0.80,   // horizontal gap between rings (screen-heights)
  ringHeight:  0.68,   // on-screen ring height (bigger = easier opening)
  gapWander:   0.30,   // how far ring centers drift up/down

  // --- Penguin sprite ---
  playerW:     0.22,   // drawn width (fraction of H)
  playerX:     0.30,   // horizontal position (fraction of W)
  hitScale:    0.42,   // collision box vs. drawn sprite (smaller = friendlier)

  // --- collectibles & scoring ---
  fishValue:   5,      // points per fish (before combo)
  comboWindow: 1.5,    // seconds to chain pickups into a combo

  // --- power-ups (seconds) ---
  starTime:    6.0,    // ⭐ invincible + smash rings & eagles
  starSpeedBoost: 1.6, // ⭐ speeds the world up while active (fun rush; you slow back down when it ends)
  starGrace:   1.5,    // ⭐ extra seconds of invincibility AFTER it expires (softer landing)
  magnetTime:  7.0,    // 🧲 pulls fish toward you
  slowTime:    4.5,    // 🐌 slows the world down
  slowScale:   0.55,   // how slow (0.55 = 55% speed)

  // --- world ---
  bgScroll:    0.18,   // background parallax speed
  biomeLen:    7,      // rings per sky (sunny → sunset → night → snow → space)

  // --- arena 2: the Dusty Hills ---
  arena2At:    300,    // score at which you fly into the Dusty Hills
  gustSpacing: 0.72,   // distance between gust-cloud slots (screen-heights)

  // --- worlds & bosses ---
  // Every world is a timed flight to its boss (reliable + tunable, not
  // gated on how many fish you happened to grab).
  ammoCap:        6,    // how many ice fish you can stockpile during a boss fight before firing
  world1Time:     48,   // World 1: sunny-skies run → Captain Albatross's gun
  world2Time:     52,   // World 2: storm run → the Gun Deck
  world3Time:     58,   // World 3: final approach → the full Dreadnought
  bossDuration:  32,    // seconds you must survive before boss 1 goes down
  level2SpeedCap: 0.98, // keep the side-scroll exciting without becoming a blur
  level3SpeedCap: 1.02,
  boss2EntryTime:  3.4, // long readable entrance before the Dreadnought becomes active
  boss2FirstShot:  3.5, // guaranteed escape time after the entrance
};

/* Ring geometry, measured from the art (rings.png). One consistent frame so

  shineSpeed: 2.2,   // how fast the sun-glint travels around the ring

const RING_FRAMES = [

  { src: { x: 627, y: 129, w: 268, h: 638 }, holeCX: 760, holeCY: 358, holeH: 243 },
  { src: { x: 173, y: 769, w: 275, h: 459 }, holeCX: 308, holeCY: 988, holeH: 241 },

/* Skies, cycled every CONFIG.biomeLen rings. wash = colored overlay, dark =
   dimming, star/snow = ambient particles. */
const BIOMES = [
  { name: "Sunny Skies",   wash: [120,200,255,0.00], dark: 0.00, star: 0, snow: 0 },
  { name: "Golden Sunset", wash: [255,140,40, 0.30], dark: 0.04, star: 0, snow: 0 },
  { name: "Starry Night",  wash: [12,18,70,  0.55], dark: 0.22, star: 1, snow: 0 },
  { name: "Snowy Peaks",   wash: [205,228,255,0.32], dark: 0.03, star: 0, snow: 1 },
  { name: "Outer Space",   wash: [6,6,28,    0.78], dark: 0.45, star: 1, snow: 0 },

// Arena 2 sky — a hazy, dusty wash that overrides the cycling skies.
const DUSTY = { wash: [202,150,82, 0.42], dark: 0.06 };

/* ---- Asset loading: pull from /images/, fall back to drawn shapes ---- */
const ASSET_VER = 11;  // V5 art overhaul: painted worlds, title art, kit skins, flight anim, boss cards
function loadImg(path) {
  const img = new Image();
  img.ok = false;
  img.onload = () => { img.ok = true; };
  img.onerror = () => { img.ok = false; };
  img.src = path + (path.indexOf("?") < 0 ? "?v=" + ASSET_VER : "");
  return img;
}
function loadImgs(prefix, n) { const a = []; for (let i = 0; i < n; i++) a.push(loadImg(`images/${prefix}${i}.webp`)); return a; }
const ASSETS = {
  bg:     loadImg("images/background.webp"),
  player: loadImg("images/heropenguin.webp"),
  rings:  loadImg("images/rings.webp"),
  boss:   loadImg("images/boss.webp"),

  bullet: loadImg("images/bullet.webp"),

  },
  skins: [                                               // 0 = animated Classic heroStrip (the only one used now)
    null,
    loadImg("images/plane-sunset-v5.webp"),
    loadImg("images/plane-aurora-v5.webp"),
    loadImg("images/plane-midnight-v5.webp"),
  ],
  story: [                                               // one inset per flight-log page
    loadImg("images/story-determined-v5.webp"),
    loadImg("images/story-festival-v5.webp"),
    loadImg("images/story-captain-albatross-v5.webp"),
  ],
  bossCards: {                                           // entrance portrait by boss level
    1: loadImg("images/boss-card-cruiser-v5.webp"),
    2: loadImg("images/boss-card-gun-deck-v5.webp"),
    3: loadImg("images/boss-card-dreadnought-v5.webp"),
  },
};
const ADVENTURE_FRAMES = {
  star:   { x: 0, w: 434 }, magnet: { x: 434, w: 434 }, slow: { x: 868, w: 434 },
  shield: { x: 1270, w: 345 }, bird: { x: 1640, w: 532 },
};
const HAZARD_FRAMES = {
  storm:{x:0,w:380}, balloon:{x:410,w:330}, snowball:{x:780,w:330}, seal:{x:1145,w:390}, ufo:{x:1600,w:380},
};
const MISSION_FRAMES = {
  rescue:{x:0,w:385}, map:{x:410,w:330}, ice:{x:790,w:360}, badge:{x:1200,w:350}, festival:{x:1600,w:380},
};
// Single pilot look. (Mission checklists, badges, and kit cycling were removed in
// the World 1 declutter pass — progression is now about reaching and beating bosses.)
const PILOT = { scarf: "#e94236", scarf2: "#ff9b45", trail: "#ffffff" };
// fancy fish (clownfish + rainbow) are rarer and worth bonus points
const FISH_RARE = { 1: 15, 6: 12 };   // index → point value; others use CONFIG.fishValue

/* ------------------------------- Audio -------------------------------- */
let AC = null, muted = false, audioUnlocked = false;
function audioInit() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (!AC) return;
  if (AC.state === "suspended") AC.resume();
  if (!audioUnlocked) {            // Safari/iOS: nudge the context awake inside a real tap
    try {
      const b = AC.createBuffer(1, 1, 22050);
      const s = AC.createBufferSource(); s.buffer = b; s.connect(AC.destination); s.start(0);
    } catch (e) {}
    audioUnlocked = true;
  }
  startMusic();
}
function tone(freq, dur, type, vol, slideTo) {
  if (!AC || muted) return;
  const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type || "sine";
  o.frequency.setValueAtTime(freq, t);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol || 0.2, t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g).connect(AC.destination);
  o.start(t); o.stop(t + dur + 0.03);
}
function noiseBurst(dur, vol, cutoff) {
  if (!AC || muted) return;
  const t = AC.currentTime, n = Math.floor(AC.sampleRate * dur);
  const buf = AC.createBuffer(1, n, AC.sampleRate), d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
  const s = AC.createBufferSource(); s.buffer = buf;
  const g = AC.createGain(); g.gain.value = vol || 0.3;
  const f = AC.createBiquadFilter(); f.type = "lowpass"; f.frequency.value = cutoff || 1400;
  s.connect(f).connect(g).connect(AC.destination); s.start(t);
}
const SFX = {
  flap:    () => { tone(300, 0.08, "sine", 0.11, 540); noiseBurst(0.05, 0.05, 2400); },
  ring:    () => tone(620, 0.12, "triangle", 0.22, 940),
  fish:    () => tone(880, 0.07, "square",   0.15, 1380),
  combo:   (n) => tone(500 + n * 90, 0.10, "triangle", 0.20, 700 + n * 120),
  power:   () => { tone(523, 0.10, "square", 0.16); setTimeout(() => tone(659, 0.10, "square", 0.16), 80); setTimeout(() => tone(880, 0.16, "square", 0.16), 160); },
  smash:   () => { noiseBurst(0.18, 0.38, 1800); tone(180, 0.16, "sawtooth", 0.14, 80); },
  crash:   () => { noiseBurst(0.4, 0.45, 900); tone(160, 0.4, "sawtooth", 0.18, 50); },
  shoot:   () => tone(420, 0.06, "square", 0.08, 170),
  boom:    () => { noiseBurst(0.5, 0.5, 700); tone(120, 0.5, "sawtooth", 0.20, 40); },
  alarm:   () => { tone(440, 0.26, "sawtooth", 0.16, 300); setTimeout(() => tone(440, 0.26, "sawtooth", 0.16, 300), 300); },
};

/* ---- Background music: a light looped melody synthesized in WebAudio ---- */
let musicTimer = null, musicStep = 0;
const MUSIC = {
  // gentle, breezy major loop (16 steps); 0 = rest
  normal: [392, 0, 523, 587, 659, 0, 587, 523, 440, 0, 523, 392, 330, 0, 392, 0],
  // tenser, lower minor loop for boss fights
  boss:   [330, 392, 330, 294, 349, 294, 262, 311, 247, 294, 247, 196, 233, 196, 175, 0],
};
function musicNote(freq, dur, vol, type) {
  if (!AC || muted || !freq) return;
  const t = AC.currentTime, o = AC.createOscillator(), g = AC.createGain();
  o.type = type || "triangle"; o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g).connect(AC.destination); o.start(t); o.stop(t + dur + 0.03);
}
function musicTick() {
  if (!AC || muted || state === STATE.OVER || state === STATE.WIN) return;   // quiet on the end screens
  const onBoss = bossActive;
  const pat = onBoss ? MUSIC.boss : MUSIC.normal;
  musicNote(pat[musicStep % pat.length], onBoss ? 0.16 : 0.22, 0.05);        // melody, sits under the SFX
  if (musicStep % 4 === 0) musicNote(onBoss ? 98 : 131, 0.34, 0.06, "sine"); // bass on the downbeat
  musicStep++;
}
function startMusic() { if (!musicTimer) musicTimer = setInterval(musicTick, 205); }

/* ---------------------------- Canvas setup ---------------------------- */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let W = 0, H = 0, DPR = 1;
let isPortrait = false;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.floor(W * DPR); canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + "px"; canvas.style.height = H + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  isPortrait = W / H < 0.82;
  initAmbient();
}
window.addEventListener("resize", resize);

/* ------------------------------ helpers ------------------------------- */
const rand = (a, b) => a + Math.random() * (b - a);
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp = (a, b, t) => a + (b - a) * t;

/* ------------------------------ Game state ---------------------------- */
const STATE = { STORY: 0, READY: 1, PLAYING: 2, OVER: 3, WIN: 4 };
// Show the flight-log story only the first time; returning pilots skip straight
// to Flight School (they can replay it after clearing the game's storage).
let state = localStorage.getItem("ipcf_story_seen") ? STATE.READY : STATE.STORY;
let storyPage = 0;
let tutorialStep = 0, tutorialT = 0;

let player, rings, fish, powerups, birds, gusts, particles, texts;
let missionItems, friendlyShots;
let speed, score, passed, best, bgX, holding, shakeT, propAngle;
let steeringLeft = false, steeringRight = false;
let leftTouchId = null, rightTouchId = null;
const flightTouchIds = new Set();
const touchCapable = (navigator.maxTouchPoints || 0) > 0 || "ontouchstart" in window;
let combo, lastScoreT;
let starT, magnetT, slowT, graceT, hasShield;
let trailAcc, birdCooldown, gustCooldown, pairNext, nextSpacing, lastGapY;
let washCur, darkCur, starAmt, snowAmt, dustAmt, lastBiome;
let arena, banner, bannerT, overAt = 0;
let bossActive, bossBeaten, bossPhase, boss, shots, bossT, bossShootCd, bossPartsThrown, diedAtBoss;
let level, speedCap, diedAtBossLevel;
let panicT, panicIdx;
let perfectStreak = 0, perfectTotal = 0, nearMissT = 0;
let approachT = 0;                       // seconds flown so far this run (drives the Boss 1 meter + trigger)
let mapT = 0, bossAmmo = 0, bossSupplyCd = 0;

best = parseInt(localStorage.getItem("ipcf_best") || "0", 10) || 0;
// persisted world progress: 0 = none cleared, 3 = all bosses beaten
let worldsCleared = clamp(parseInt(localStorage.getItem("ipcf_worlds") || "0", 10) || 0, 0, 3);
if (!worldsCleared && localStorage.getItem("ipcf_world1_cleared")) worldsCleared = 1;  // migrate old flag
let currentWorld = 1;
const reducedMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

/* ambient particle pools (created on resize) */
let stars = [], flakes = [];
function initAmbient() {
  stars = [];
  for (let i = 0; i < 70; i++) stars.push({ x: rand(0, W), y: rand(0, H * 0.8), r: rand(0.6, 2.2), p: rand(0, 6.28) });
  flakes = [];
  for (let i = 0; i < 90; i++) flakes.push({ x: rand(0, W), y: rand(0, H), r: rand(1.5, 4), vx: rand(-0.04, 0.04), vy: rand(0.12, 0.28), p: rand(0, 6.28) });
}

function reset() {
  player = { x: W * CONFIG.playerX, y: H * 0.45, vx: 0, vy: 0, angle: 0 };
  rings = []; fish = []; powerups = []; birds = []; gusts = []; particles = []; texts = [];
  missionItems = []; friendlyShots = [];
  speed = CONFIG.startSpeed;
  score = 0; passed = 0; bgX = 0; holding = false; shakeT = 0; propAngle = 0;
  steeringLeft = steeringRight = false; leftTouchId = rightTouchId = null; flightTouchIds.clear();
  combo = 0; lastScoreT = -99;
  starT = magnetT = slowT = graceT = 0; hasShield = false;
  bossActive = false; bossBeaten = false; bossPhase = 0; boss = null; shots = []; bossT = 0; bossShootCd = 0;
  bossPartsThrown = 0; diedAtBoss = false;
  level = 1; speedCap = CONFIG.maxSpeed; diedAtBossLevel = 1;
  panicT = 0; panicIdx = 0;
  tutorialStep = 0; tutorialT = 0;
  perfectStreak = 0; perfectTotal = 0; nearMissT = 0;
  approachT = 0; mapT = 0;
  bossAmmo = 0; bossSupplyCd = 3.5;
  trailAcc = 0; birdCooldown = H * 2; gustCooldown = H * 1.2;
  pairNext = false; nextSpacing = CONFIG.ringSpacing; lastGapY = 0.5;
  arena = 1;
  // sky starts fully on biome 0 (no pop-in)
  washCur = BIOMES[0].wash.slice(); darkCur = BIOMES[0].dark; starAmt = 0; snowAmt = 0; dustAmt = 0;
  lastBiome = 0; banner = ""; bannerT = 0;
  let x = W + W * 0.2;
  for (let i = 0; i < 3; i++) {
    const r = makeRing(x);
    if (i === 0) r.baseCy = r.cy = H * 0.50;
    if (i === 1) {
      r.baseCy = r.cy = H * 0.42;
      spawnFishLine(r.x, r.cy, H * 0.025);
    }
    if (i === 2) {
      r.baseCy = r.cy = H * 0.58;
      powerups.push({ x: r.x, y: r.cy, type: "shield", p: 0 });
    }
    rings.push(r); x += H * CONFIG.ringSpacing;
  }
}

function makeRing(x) {
  let cy;
  if (pairNext) {                              // partner ring of a pair: keep close
    cy = lastGapY + rand(-0.05, 0.05);
    pairNext = false;
  } else {
    cy = lastGapY + (Math.random() * 2 - 1) * CONFIG.gapWander;
  }
  cy = clamp(cy, 0.22, 0.78); lastGapY = cy;
  const r = { x, baseCy: cy * H, cy: cy * H, scored: false, smashed: false,
              phase: rand(0, 6.283), type: "static", driftAmp: 0, driftFreq: 0 };
  // drifting rings appear once you're warmed up, more often the deeper you go
  if (passed >= 8 && Math.random() < clamp((passed - 8) / 55, 0, 0.45)) {
    r.type = "drift"; r.driftAmp = H * rand(0.05, 0.12); r.driftFreq = rand(1.1, 2.1);
  }
  return r;
}

/* shared collectible spawners */
function pickFishType() {
  if (Math.random() < 0.12) return Math.random() < 0.5 ? 1 : 6;   // rare fancy fish
  const common = [0, 2, 3, 4, 5];
  return common[Math.random() * common.length | 0];
}
function spawnFishLine(x, cy, spread) {
  const n = 2 + (Math.random() * 3 | 0);       // 2–4 fish
  const type = pickFishType();                  // a school shares a type
  for (let i = 0; i < n; i++) {
    fish.push({
      x: x + (i - (n - 1) / 2) * H * 0.06,
      y: clamp(cy + (Math.random() * 2 - 1) * spread, H * 0.12, H * 0.88),
      p: rand(0, 6.28), type,
    });
  }
}
function maybeSpawnPower(x, cy) {
  if (passed >= 5 && Math.random() < 0.13) {
    const types = ["star", "magnet", "slow", "shield", "shield"];   // shield a bit more common (very useful)
    powerups.push({
      x, y: clamp(cy, H * 0.18, H * 0.82),
      type: types[Math.random() * types.length | 0], p: rand(0, 6.28),
    });
  }
}
/* attach fish + power-ups to a freshly spawned ring */
function attachItems(r) {
  const holeHalf = (H * CONFIG.ringHeight * RING.holeFrac) / 2;
  if (Math.random() < 0.72) spawnFishLine(r.x, r.cy, holeHalf * 0.55);
  maybeSpawnPower(r.x + H * CONFIG.ringSpacing * 0.5, r.cy + (Math.random() * 2 - 1) * H * 0.14);
}
function haptic(ms) { if (!reducedMotion && navigator.vibrate) navigator.vibrate(ms); }
/* per-world approach: seconds of flight before that world's boss shows up */
function worldTime(n) { return n >= 3 ? CONFIG.world3Time : n === 2 ? CONFIG.world2Time : CONFIG.world1Time; }
/* how far along this world's approach we are (0..1) — drives the boss meter + cloud darkening */
function approachFrac() { return clamp(approachT / worldTime(level), 0, 1); }
/* set up a world's speed/arena, used by both the world select and boss retry */
function applyWorldConfig(n) {
  currentWorld = n; level = n;
  if (n >= 3)      { arena = 4; speedCap = CONFIG.level3SpeedCap; speed = CONFIG.startSpeed * 1.55; }
  else if (n === 2){ arena = 3; speedCap = CONFIG.level2SpeedCap; speed = CONFIG.startSpeed * 1.45; }
}
function startWorld(n) {
  reset(); applyWorldConfig(n);
  state = STATE.PLAYING; holding = true;
  tutorialT = n === 1 ? 5 : 0;
  banner = n === 2 ? "WORLD 2 — THE STORM RUN!" : n >= 3 ? "WORLD 3 — DREADNOUGHT SKIES!" : "";
  bannerT = banner ? 3.2 : 0;
  SFX.flap();
}
/* clouds start light and darken as the boss approaches (cloud_0..8) */
function cloudTier() { return clamp(Math.floor(approachFrac() * (ASSETS.clouds.length - 1)), 0, ASSETS.clouds.length - 1); }
/* a gust cloud hazard in the Dusty Hills */
function makeGust(x, yf) {
  return { x, baseY: yf * H, y: yf * H, r: H * rand(0.075, 0.105), p: rand(0, 6.28), scored: false, cloud: cloudTier() };
}

/* ------------------------------- Input -------------------------------- */
function fireFriendlyShot() {
  if (!bossActive || bossAmmo <= 0) return;
  bossAmmo--;
  friendlyShots.push({ x: player.x + H*.08, y: player.y, vx: H*1.28, r: H*.028, p: 0 });
  SFX.shoot(); haptic(18);
}
function directionButtons() {
  const r=H*.066, cy=H*.82;
  return { left:{x:H*.095,y:cy,r}, right:{x:H*.245,y:cy,r} };
}
// Big dedicated FIRE button (bottom-right) — only live during a boss fight. Lets you
// HOLD your ice fish and shoot on purpose, instead of every climb-tap dumping a shot.
function fireButton(){ const r=H*.082; return { x: W-H*.13, y: H*.80, r }; }
function fireHit(px,py){ if(!bossActive)return false; const b=fireButton(); return Math.hypot(px-b.x,py-b.y)<=b.r*1.2; }
function directionHit(px,py) {
  const d=directionButtons();
  if(Math.hypot(px-d.left.x,py-d.left.y)<=d.left.r*1.25)return "left";
  if(Math.hypot(px-d.right.x,py-d.right.y)<=d.right.r*1.25)return "right";
  return null;
}
function continueBossButtonRect(){const w=Math.min(W*.42,H*.62),h=H*.085;return{x:(W-w)/2,y:H*.68,w,h};}
function continueBossHit(px,py){const b=continueBossButtonRect();return px>=b.x&&px<=b.x+b.w&&py>=b.y&&py<=b.y+b.h;}
function continueBoss() {
  const retryLevel=diedAtBossLevel; // preserve this before reset() restores level one
  reset(); applyWorldConfig(retryLevel);
  approachT = worldTime(retryLevel);   // skip straight back to the fight
  state=STATE.PLAYING;startBoss(retryLevel);
}
function press(px, py) {
  audioInit();
  if (isPortrait) return;
  if (state === STATE.STORY) {
    storyPage++;
    if (storyPage >= 3) { storyPage = 0; state = STATE.READY; localStorage.setItem("ipcf_story_seen", "1"); }
  }
  else if (state === STATE.READY) {
    // world select: tap a card to fly that world; anywhere else = next world up
    if (px != null && worldsCleared > 0) {
      const hit = worldCardHit(px, py);
      if (hit) { startWorld(hit); return; }
    }
    startWorld(Math.min(worldsCleared + 1, 3));
  }
  else if (state === STATE.PLAYING) { holding = true; SFX.flap(); }
  else if (state === STATE.WIN && performance.now() - overAt > 350) { reset(); state = STATE.READY; }
  else if (state === STATE.OVER && performance.now() - overAt > 350) {
    if (diedAtBoss) { if(px==null||continueBossHit(px,py))continueBoss(); }
    else { reset(); state = STATE.READY; }
  }
}
function release() { holding = false; }

/* Tappable speaker icon (top-right). Returns true if the tap hit it, so a
   tap on the button toggles sound instead of making the penguin flap. */
function muteBtnHit(px, py) {
  const cx = W - H * 0.05, cy = H * 0.05, r = H * 0.07;
  return Math.abs(px - cx) < r && Math.abs(py - cy) < r;
}
function handleMuteTap(px, py) {
  if (!muteBtnHit(px, py)) return false;
  audioInit();
  muted = !muted;
  return true;
}

canvas.addEventListener("mousedown", (e) => { e.preventDefault(); if (handleMuteTap(e.clientX, e.clientY)) return; if (fireHit(e.clientX, e.clientY)) { fireFriendlyShot(); return; } press(e.clientX, e.clientY); });
window.addEventListener("mouseup", () => release());
canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  for(const t of e.changedTouches){
    if(handleMuteTap(t.clientX,t.clientY))continue;
    if(state===STATE.PLAYING&&fireHit(t.clientX,t.clientY)){fireFriendlyShot();continue;}
    const dir=state===STATE.PLAYING?directionHit(t.clientX,t.clientY):null;
    if(dir==="left"){leftTouchId=t.identifier;steeringLeft=true;continue;}
    if(dir==="right"){rightTouchId=t.identifier;steeringRight=true;continue;}
    flightTouchIds.add(t.identifier);press(t.clientX,t.clientY);
  }
}, { passive: false });
function endTouches(e){e.preventDefault();for(const t of e.changedTouches){if(t.identifier===leftTouchId){leftTouchId=null;steeringLeft=false;}if(t.identifier===rightTouchId){rightTouchId=null;steeringRight=false;}flightTouchIds.delete(t.identifier);}if(!flightTouchIds.size)release();}
window.addEventListener("touchend",endTouches,{passive:false});
window.addEventListener("touchcancel",endTouches,{passive:false});
window.addEventListener("keydown", (e) => {
  if (e.code === "Space" || e.code === "ArrowUp") { e.preventDefault(); if (!e.repeat) press(); }
  if(e.code==="ArrowLeft"){e.preventDefault();steeringLeft=true;}
  if(e.code==="ArrowRight"){e.preventDefault();steeringRight=true;}
  if ((e.code === "KeyF" || e.code === "Enter") && state === STATE.PLAYING) { e.preventDefault(); fireFriendlyShot(); }
  if (e.code === "KeyM") { muted = !muted; }
  // R on the game-over screen = full restart from zero (vs. tap = retry the boss)
  if (e.code === "KeyR" && state === STATE.OVER) { reset(); state = STATE.READY; }
  // 1/2/3 on the title = fly straight into that world (if unlocked)
  if (state === STATE.READY && /^Digit[123]$/.test(e.code)) {
    const n = Number(e.code.slice(5));
    if (n <= worldsCleared + 1) { e.preventDefault(); startWorld(n); }
  }
});
window.addEventListener("keyup", (e) => {
  if (e.code === "Space" || e.code === "ArrowUp") { e.preventDefault(); release(); }
  if(e.code==="ArrowLeft")steeringLeft=false;
  if(e.code==="ArrowRight")steeringRight=false;
});
// belt-and-suspenders: any interaction anywhere keeps the audio context awake
["pointerdown", "touchstart", "keydown"].forEach((ev) =>
  window.addEventListener(ev, audioInit));

/* ----------------------------- scoring -------------------------------- */
function addScore(base, x, y) {
  const now = performance.now() / 1000;
  combo = (now - lastScoreT < CONFIG.comboWindow) ? Math.min(combo + 1, 9) : 1;
  lastScoreT = now;
  const gain = base * combo;
  score += gain;
  addText(x, y, "+" + gain, combo > 1 ? "#ffd34d" : "#ffffff", combo > 1 ? 1.25 : 1);
  if (combo > 1) SFX.combo(combo);
  return gain;
}
function addText(x, y, str, color, scale) {
  texts.push({ x, y, str, color, scale: scale || 1, life: 0.9, max: 0.9 });
}

/* ----------------------------- particles ------------------------------ */
function burst(kind, x, y, n, opts) {
  opts = opts || {};
  for (let i = 0; i < n; i++) {
    const a = rand(0, 6.283), sp = rand(opts.spMin || 0.1, opts.spMax || 0.5) * H;
    particles.push({
      kind, x, y,
      vx: Math.cos(a) * sp + (opts.vx || 0), vy: Math.sin(a) * sp + (opts.vy || 0),
      life: rand(opts.lifeMin || 0.4, opts.lifeMax || 0.8),
      max: 0.8, rot: rand(0, 6.28), vr: rand(-8, 8),
      size: rand(opts.sMin || 0.012, opts.sMax || 0.03) * H,
      color: opts.color || "#fff", grav: opts.grav == null ? 1.4 : opts.grav,
    });
  }
}

/* ------------------------------- Update ------------------------------- */
function gameOver() {
  diedAtBoss = bossActive; diedAtBossLevel = level;
  state = STATE.OVER; overAt = performance.now(); shakeT = 0.45;
  SFX.crash();
  burst("feather", player.x, player.y, 18, { color: "#fff", spMax: 0.7, lifeMax: 1.1 });
  burst("feather", player.x, player.y, 10, { color: "#222", spMax: 0.7, lifeMax: 1.1 });
  if (score > best) { best = score; localStorage.setItem("ipcf_best", String(best)); }
}

function consumeShield(x, y) {   // 🛡️ pops, soaks one hit, gives a brief invuln window
  hasShield = false; graceT = Math.max(graceT, 0.9);
  burst("spark", x, y, 20, { color: "#7fd0ff", spMax: 0.9, grav: 0.1, lifeMax: 0.6 });
  addText(player.x, player.y - H * 0.06, "SHIELD!", "#7fd0ff", 1.25);
  shakeT = Math.max(shakeT, 0.25); SFX.smash();
}

function update(dt) {
  const ws = slowT > 0 ? CONFIG.slowScale : 1;     // world time-scale (slow-mo)
  const starRush = starT > 0 ? CONFIG.starSpeedBoost : 1;  // ⭐ speeds the world up while the star is active
  bgX -= (state === STATE.PLAYING ? speed * starRush : CONFIG.startSpeed) * CONFIG.bgScroll * H * dt * ws;
  if (shakeT > 0) shakeT -= dt;
  propAngle += dt * (state === STATE.PLAYING ? 26 : 10);

  updateSky(dt);
  updateAmbient(dt, ws);
  updateParticles(dt);
  for (let i = texts.length - 1; i >= 0; i--) {
    const tx = texts[i]; tx.life -= dt; tx.y -= H * 0.22 * dt;
    if (tx.life <= 0) texts.splice(i, 1);
  }

  if (state === STATE.STORY || state === STATE.READY) {
    player.y = H * 0.45 + Math.sin(performance.now() / 350) * H * 0.02;
    player.angle = Math.sin(performance.now() / 350) * 0.06;
    return;
  }
  if (state !== STATE.PLAYING) return;

  tutorialT = Math.max(0, tutorialT - dt);
  mapT = Math.max(0, mapT - dt);
  nearMissT = Math.max(0, nearMissT - dt);
  if (passed >= 3) tutorialStep = 3;
  else if (passed >= 2) tutorialStep = 2;
  else if (passed >= 1) tutorialStep = 1;

  // power-up timers
  if (starT > 0) { starT -= dt; if (starT <= 0) graceT = CONFIG.starGrace; }  // ⭐ ends → grace window begins
  else if (graceT > 0) graceT -= dt;
  if (magnetT > 0) magnetT -= dt;
  if (slowT > 0) slowT -= dt;
  const inv = starT > 0 || graceT > 0;   // invincible during the star AND its grace tail

  // physics (player is NOT slowed — slow-mo only eases the world)
  player.vy += (holding ? -CONFIG.lift : CONFIG.gravity) * H * dt;
  player.vy -= player.vy * CONFIG.drag * dt;   // air resistance: bleeds off momentum so it glides & floats at the top of each tap
  player.vy = clamp(player.vy, -CONFIG.maxClimb * H, CONFIG.maxFall * H);
  player.y += player.vy * dt;
  const sideInput=(steeringRight?1:0)-(steeringLeft?1:0);
  player.vx += sideInput*CONFIG.sideAccel*H*dt;
  player.vx -= player.vx*CONFIG.sideDrag*dt;
  player.vx=clamp(player.vx,-CONFIG.maxSide*H,CONFIG.maxSide*H);
  player.x+=player.vx*dt;
  const minPX=W*CONFIG.playerMinX,maxPX=W*CONFIG.playerMaxX;
  if(player.x<minPX){player.x=minPX;player.vx=Math.max(0,player.vx);}
  if(player.x>maxPX){player.x=maxPX;player.vx=Math.min(0,player.vx);}
  const targetAngle = clamp(player.vy / (CONFIG.maxFall * H) * 0.7, -0.5, 0.7);
  player.angle += (targetAngle - player.angle) * Math.min(1, dt * 10);

  // emit cloud-puff trail
  trailAcc += dt;
  const drawW = H * CONFIG.playerW, drawH = drawW * (616 / 940);
  if (trailAcc > 0.05) {
    trailAcc = 0;
    particles.push({
      kind: "puff", x: player.x - drawW * 0.42, y: player.y + drawH * 0.12,
      vx: -speed * H * 0.25 * ws * starRush, vy: rand(-0.02, 0.02) * H,
      life: 0.55, max: 0.55, size: H * 0.018, grow: H * 0.05, color: PILOT.trail,
    });
  }

  const worldDx = speed * H * dt * ws * starRush;
  const moveLeft = (arr) => { for (const o of arr) o.x -= worldDx; };
  moveLeft(rings); moveLeft(fish); moveLeft(powerups); moveLeft(gusts); moveLeft(missionItems);

  // player hit radius (used by boss shots; rings compute their own below)
  const phhAll = (drawW * (616 / 940) * CONFIG.hitScale) / 2;

  // ---- boss battle ----
  // Every world's boss arrives on a steady flight timer, so the run to the
  // boss is short and reliable (not gated on how many fish you happened to grab).
  if (!bossActive && !bossBeaten) {
    approachT += dt;
    if (approachT >= worldTime(level)) startBoss(level);
  }
  if (bossActive) {
    bossSupplyCd -= dt;
    if (bossSupplyCd <= 0 && missionItems.filter(i => i.kind === "ice").length < 2) {
      missionItems.push({ x: W + H*.1, y: rand(.22,.78)*H, kind: "ice", p: rand(0,6.28) });
      bossSupplyCd = rand(4.2,6.2);
    }
    updateBoss(dt, ws, phhAll);
    if (state !== STATE.PLAYING) return;   // a boss shot may have ended the run
  }

  // enter the Dusty Hills at the threshold score
  if (arena === 1 && score >= CONFIG.arena2At) {
    arena = 2; banner = "Welcome to the Dusty Hills!"; bannerT = 2.8;
  }

  // drifting ring motion
  const tnow = performance.now() / 1000;
  for (const r of rings) {
    r.cy = r.type === "drift"
      ? clamp(r.baseCy + Math.sin(tnow * r.driftFreq + r.phase) * r.driftAmp, H * 0.18, H * 0.82)
      : r.baseCy;
  }

  // recycle rings; spawn new ones only in arena 1 (variable spacing makes pairs)
  while (rings.length && rings[0].x < -W * 0.35) rings.shift();
  if ((arena === 1 || arena === 3 || arena === 4) && !bossActive) {
    const lastX = rings.length ? rings[rings.length - 1].x : W;
    if (lastX < W + H * nextSpacing) {
      const r = makeRing(lastX + H * nextSpacing);
      rings.push(r);
      attachItems(r);
      // decide spacing to the NEXT ring: occasionally a tight pair
      if (passed >= 16 && !pairNext && Math.random() < 0.16) { pairNext = true; nextSpacing = 0.42; }
      else nextSpacing = CONFIG.ringSpacing;
    }
  }

  // Dusty Hills: spawn gust-cloud slots, always leaving room to weave through
  while (gusts.length && gusts[0].x < -W * 0.2) gusts.shift();
  if (arena === 2 && !bossActive) {
    gustCooldown -= worldDx;
    if (gustCooldown <= 0) {
      const x = W + H * 0.18, y1 = rand(0.15, 0.85);
      gusts.push(makeGust(x, y1));
      if (Math.random() < 0.4) {                   // sometimes a 2nd cloud, big gap kept
        let y2 = y1 + (Math.random() < 0.5 ? -1 : 1) * rand(0.5, 0.65);
        y2 = clamp(y2, 0.12, 0.88);
        if (Math.abs(y2 - y1) > 0.42) gusts.push(makeGust(x + rand(-0.04, 0.04) * H, y2));
      }
      if (Math.random() < 0.7) spawnFishLine(x + H * CONFIG.gustSpacing * 0.5, rand(0.25, 0.75) * H, H * 0.05);
      maybeSpawnPower(x + H * CONFIG.gustSpacing * 0.5, rand(0.25, 0.75) * H);
      gustCooldown = H * CONFIG.gustSpacing;
    }
  }

  // collision geometry
  const ringH = H * CONFIG.ringHeight, ringW = ringH * RING.aspect;
  const holeHalf = (ringH * RING.holeFrac) / 2;
  const phw = (drawW * CONFIG.hitScale) / 2, phh = (drawH * CONFIG.hitScale) / 2;

  // rings are SOLID objects now: only the ring band hurts you (flying clear over
  // or under is safe, like the clouds); you only score by threading the hole.
  const ringHalf = ringH / 2;
  for (const r of rings) {
    if (r.smashed) continue;
    const holeTop = r.cy - holeHalf, holeBot = r.cy + holeHalf;
    const ringTop = r.cy - ringHalf, ringBot = r.cy + ringHalf;

    // crossing the ring's x: award a point ONLY if the penguin went through the hole
    if (!r.scored && r.x < player.x) {
      r.scored = true;
      if (player.y > holeTop && player.y < holeBot) {
        passed++;
        if (passed <= 3) tutorialT = 4.0;
        speed = Math.min(speedCap, speed + CONFIG.speedRamp);
        addScore(1, player.x, player.y - drawH * 0.5);
        const centerError = Math.abs(player.y - r.cy);
        if (centerError < holeHalf * 0.18) {
          perfectStreak++; perfectTotal++;
          addScore(2 + Math.min(perfectStreak, 5), player.x, player.y - drawH*.78);
          addText(player.x, player.y + drawH*.62, perfectStreak > 1 ? `PERFECT x${perfectStreak}` : "PERFECT!", "#ffd34d", 1.25);
          burst("spark", player.x, player.y, 18, { color:"#ffd34d", spMax:.65, grav:.1, lifeMax:.7 });
          haptic(22);
        } else {
          perfectStreak = 0;
          if (centerError > holeHalf*.76) { nearMissT = .55; addText(player.x, player.y, "CLOSE CALL!", "#ff9b45", 1.05); }
        }
        SFX.ring();
        if (arena === 1) checkBiome();
      }
    }

    // hit the solid band (between the ring edge and the hole) = crash
    if (Math.abs(r.x - player.x) < ringW * 0.45 + phw) {
      const pTop = player.y - phh, pBot = player.y + phh;
      const hitUpperBand = pBot > ringTop && pTop < holeTop;   // clipped the top of the ring
      const hitLowerBand = pTop < ringBot && pBot > holeBot;   // clipped the bottom of the ring
      if (hitUpperBand || hitLowerBand) {
        if (inv || hasShield) { if (!inv) consumeShield(r.x, r.cy); r.smashed = true; r.scored = true; smashFx(r.x, r.cy); }
        else { gameOver(); return; }
      }
    }
  }

  // fish: magnet pull + collect
  const magnet = magnetT > 0;
  for (let i = fish.length - 1; i >= 0; i--) {
    const f = fish[i];
    if (magnet) {
      const dxp = player.x - f.x, dyp = player.y - f.y, d = Math.hypot(dxp, dyp);
      if (d < H * 0.4 && d > 1) { f.x += (dxp / d) * H * 1.4 * dt; f.y += (dyp / d) * H * 1.4 * dt; }
    }
    if (f.x < -W * 0.1) { fish.splice(i, 1); continue; }
    if (Math.hypot(player.x - f.x, player.y - f.y) < phh + H * 0.03) {
      fish.splice(i, 1);
      const val = FISH_RARE[f.type] || CONFIG.fishValue;
      addScore(val, f.x, f.y);
      const rare = !!FISH_RARE[f.type];
      burst("spark", f.x, f.y, rare ? 12 : 7, { color: rare ? "#7fffd4" : "#ffd34d", spMax: rare ? 0.6 : 0.4, grav: 0.3, lifeMax: 0.5 });
      SFX.fish();
    }
  }

  // boss ice-fish ammo (the only collectible left in this array — grab it to shoot the boss)
  for (let i = missionItems.length - 1; i >= 0; i--) {
    const it = missionItems[i]; it.p += dt * 2.5;
    if (it.x < -W*.12) { missionItems.splice(i,1); continue; }
    if (Math.hypot(player.x-it.x, player.y-it.y) < phh + H*.055) {
      missionItems.splice(i,1);
      bossAmmo = Math.min(CONFIG.ammoCap,bossAmmo+1); addText(it.x,it.y,"ICE FISH +1","#7fd0ff",1.12);
      burst("spark",it.x,it.y,16,{color:"#7fd0ff",spMax:.6,grav:.15,lifeMax:.7});SFX.power();haptic(18);
    }
  }

  // power-ups: collect
  for (let i = powerups.length - 1; i >= 0; i--) {
    const pu = powerups[i];
    if (pu.x < -W * 0.1) { powerups.splice(i, 1); continue; }
    if (Math.hypot(player.x - pu.x, player.y - pu.y) < phh + H * 0.05) {
      powerups.splice(i, 1);
      if (pu.type === "star") starT = CONFIG.starTime;
      else if (pu.type === "magnet") magnetT = CONFIG.magnetTime;
      else if (pu.type === "shield") hasShield = true;
      else slowT = CONFIG.slowTime;
      const label = pu.type === "star" ? "SUPER STAR!" : pu.type === "magnet" ? "MAGNET!" : pu.type === "shield" ? "SHIELD!" : "SLOW-MO!";
      burst("spark", pu.x, pu.y, 14, { color: pu.type === "shield" ? "#7fd0ff" : "#aef", spMax: 0.6, grav: 0.2, lifeMax: 0.7 });
      addText(pu.x, pu.y, label, pu.type === "shield" ? "#7fd0ff" : "#aef", 1.1);
      SFX.power();
    }
  }

  // gust clouds: bob, score, collide
  for (const g of gusts) {
    g.y = g.baseY + Math.sin(tnow * 1.6 + g.p) * H * 0.03;
    if (!g.scored && g.x < player.x) {
      g.scored = true;
      speed = Math.min(CONFIG.maxSpeed, speed + CONFIG.speedRamp);
      addScore(1, player.x, player.y - drawH * 0.5);
      SFX.ring();
    }
    if (Math.hypot(player.x - g.x, player.y - g.y) < g.r * 0.78 + phh * 0.7) {
      if (inv || hasShield) { if (!inv) consumeShield(g.x, g.y); smashFx(g.x, g.y); g.x = -9999; }
      else { gameOver(); return; }
    }
  }

  // Each world introduces a troublemaker with its own movement personality.
  birdCooldown -= worldDx;
  if (!bossActive && passed >= 8 && birdCooldown <= 0) {
    const world = activeWorld();
    const kinds = ["albatross","balloon","storm","snowball","ufo","seal","storm","ufo"];
    const kind = kinds[world] || "albatross";
    birds.push({ kind, x: W + H * 0.14, y: rand(0.2, 0.8) * H, p: rand(0, 6.28), baseY: 0, near:false });
    birds[birds.length - 1].baseY = birds[birds.length - 1].y;
    birdCooldown = H * rand(1.3, 2.6);
  }
  for (let i = birds.length - 1; i >= 0; i--) {
    const b = birds[i];
    const factor = b.kind === "balloon" ? .72 : b.kind === "snowball" ? 1.42 : b.kind === "ufo" ? 1.28 : 1.08;
    const r = H * (b.kind === "seal" ? .06 : b.kind === "storm" ? .058 : b.kind === "balloon" ? .052 : .047);
    b.x -= speed * H * factor * dt * ws * starRush;
    if (b.kind === "storm") b.baseY += clamp(player.y-b.baseY,-H*.12,H*.12)*dt*.32;
    if (b.kind === "snowball") b.baseY += Math.sin(b.p)*H*.045*dt;
    const wave = b.kind === "ufo" ? .11 : b.kind === "seal" ? .07 : .04;
    const freq = b.kind === "ufo" ? 5.2 : b.kind === "balloon" ? 1.4 : 3;
    b.y = b.baseY + Math.sin(tnow * freq + b.p) * H * wave;
    if (b.x < -W * 0.15) { birds.splice(i, 1); continue; }
    const bd = Math.hypot(player.x-b.x,player.y-b.y);
    if (!b.near && b.x < player.x && bd < phh+r+H*.08) { b.near=true; addScore(5,player.x,player.y); addText(player.x,player.y-H*.07,"NEAR MISS!","#ff9b45",1.05); }
    if (bd < phh + r) {
      if (inv || hasShield) { if (!inv) consumeShield(b.x, b.y); birds.splice(i, 1); smashFx(b.x, b.y); }

function smashFx(x, y) {

  burst("shard", x, y, 6, { color: "#fff6c8", spMax: 0.7, grav: 1.0, lifeMax: 0.8 });

function checkBiome() {

/* =============================== BOSS BATTLE ===========================

function startBoss(lvl) {

           muzX: finalBoss ? -.42 : segment ? -.34 : -.24, muzY: finalBoss ? .08 : segment ? .04 : -.18,
           muzRx: finalBoss ? .05 : segment ? .08 : .055, muzRy: finalBoss ? .07 : segment ? .13 : .11 };

}

function throwPart() {   // a chunk of the cruiser breaks off and flies at the penguin

  let dx = player.x - ox, dy = player.y - oy; const d = Math.hypot(dx, dy) || 1; dx /= d; dy /= d;
  const sp = H * rand(0.34, 0.5);
  shots.push({ x: ox, y: oy, vx: dx * sp, vy: dy * sp, r: H * 0.05, kind: "part",

  burst("puff", ox, oy, 7, { color: "#2a2a2a", spMax: 0.28, lifeMax: 1.3, grav: -0.1 });
  shakeT = Math.max(shakeT, 0.28); SFX.boom();
}

function updateBoss(dt, ws, phh) {

function updateSky(dt) {
  const k = Math.min(1, dt * 1.5);
  let wash, dark, star, snow, dust;
  if (bossActive) {                               // boss fight: stormy, ominous sky
    wash = [60, 14, 34, 0.55]; dark = 0.34; star = 0; snow = 0; dust = 0;
  } else if (arena === 4) {                       // Level 3: the Dreadnought Approach
    wash = [18, 15, 58, 0.72]; dark = 0.40; star = 1; snow = 0; dust = 0;
  } else if (arena === 3) {                       // Level 2: the Storm Front
    wash = [40, 30, 72, 0.5]; dark = 0.30; star = 1; snow = 0; dust = 0;
  } else if (arena === 2) {                       // Dusty Hills overrides the sky cycle
    wash = DUSTY.wash; dark = DUSTY.dark; star = 0; snow = 0; dust = 1;
  } else {
    const b = BIOMES[(state === STATE.PLAYING ? Math.floor(passed / CONFIG.biomeLen) : 0) % BIOMES.length];
    wash = b.wash; dark = b.dark; star = b.star; snow = b.snow; dust = 0;
  }
  for (let i = 0; i < 4; i++) washCur[i] = lerp(washCur[i], wash[i], k);
  darkCur = lerp(darkCur, dark, k);
  starAmt = lerp(starAmt, star, k);
  snowAmt = lerp(snowAmt, snow, k);
  dustAmt = lerp(dustAmt, dust, k);

}
function updateAmbient(dt, ws) {

  if (starAmt > 0.01) for (const s of stars) { s.x -= drift * 0.12; if (s.x < 0) { s.x += W; s.y = rand(0, H * 0.8); } s.p += dt * 3; }

    f.x -= drift * 0.25 - f.vx * H * dt; f.y += f.vy * H * dt; f.p += dt * 2;
    if (f.y > H) { f.y = -10; f.x = rand(0, W); }
    if (f.x < 0) f.x += W;
  }
  if (dustAmt > 0.01) for (const f of flakes) {   // dust drifts mostly sideways
    f.x -= drift * 0.5; f.y += Math.sin(f.p) * H * 0.01 * dt * 60; f.p += dt * 1.5;
    if (f.x < 0) { f.x += W; f.y = rand(0, H); }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt; if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    if (p.grav) p.vy += p.grav * H * dt;
    if (p.vr) p.rot += p.vr * dt;

function drawPlayer() {

  ctx.fillStyle="#f6fbff";ctx.textAlign="center";ctx.textBaseline="top";
  ctx.font=`800 ${Math.round(h*.78)}px -apple-system,system-ui,sans-serif`;
  ctx.fillText(f<.99?"WORLD "+level+" \u2014 FLYING TO THE BOSS":"BOSS INCOMING!",W/2,y+h*1.1);
  ctx.restore();
}
function drawFireButton(){
  if(!bossActive)return;
  const b=fireButton(),hot=bossAmmo>0;
  ctx.save();
  // round button — bright when loaded, dim when empty
  ctx.fillStyle=hot?"rgba(255,122,69,.92)":"rgba(16,42,86,.5)";
  ctx.strokeStyle=hot?"#fff":"rgba(246,251,255,.5)";ctx.lineWidth=Math.max(2,b.r*.09);
  ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,7);ctx.fill();ctx.stroke();
  drawMissionSprite("ice",b.x,b.y-b.r*.05,b.r*1.2,0,hot?1:.35);
  // stored-count badge (top-right of the button)
  ctx.fillStyle=hot?"#102a56":"#5b6b82";ctx.beginPath();ctx.arc(b.x+b.r*.72,b.y-b.r*.72,b.r*.44,0,7);ctx.fill();
  ctx.fillStyle="#fff";ctx.textAlign="center";ctx.textBaseline="middle";ctx.font=`900 ${Math.round(b.r*.52)}px -apple-system,system-ui,sans-serif`;ctx.fillText(String(bossAmmo),b.x+b.r*.72,b.y-b.r*.7);
  // label under the button
  ctx.fillStyle="#fff";ctx.strokeStyle="rgba(0,0,0,.45)";ctx.lineWidth=Math.max(2,b.r*.045);ctx.textBaseline="top";ctx.font=`900 ${Math.round(b.r*.34)}px -apple-system,system-ui,sans-serif`;
  const lab=hot?"FIRE":"GET ICE FISH";ctx.strokeText(lab,b.x,b.y+b.r*1.08);ctx.fillText(lab,b.x,b.y+b.r*1.08);
  ctx.restore();
}
function drawDirectionControls(){
  if(!touchCapable||state!==STATE.PLAYING)return;const d=directionButtons();ctx.save();
  for(const [kind,b] of Object.entries(d)){const down=kind==="left"?steeringLeft:steeringRight;ctx.fillStyle=down?"rgba(255,211,77,.88)":"rgba(16,42,86,.62)";ctx.strokeStyle=down?"#102a56":"rgba(246,251,255,.72)";ctx.lineWidth=Math.max(2,H*.005);ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,7);ctx.fill();ctx.stroke();ctx.fillStyle=down?"#102a56":"#f6fbff";ctx.beginPath();const s=b.r*.44,dir=kind==="left"?-1:1;ctx.moveTo(b.x+dir*s,b.y);ctx.lineTo(b.x-dir*s*.45,b.y-s);ctx.lineTo(b.x-dir*s*.45,b.y+s);ctx.closePath();ctx.fill();}
  ctx.restore();
}
function drawContinueBossButton(){
  const b=continueBossButtonRect(),label=`CONTINUE BOSS ${Math.max(1,diedAtBossLevel)}`;ctx.save();roundedPanel(b.x,b.y,b.w,b.h,b.h/2,"#ff7a45","#f6fbff");ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillStyle="#fff";ctx.font=`900 ${Math.round(H*.033)}px -apple-system,system-ui,sans-serif`;ctx.fillText(label,b.x+b.w/2,b.y+b.h*.48);ctx.fillStyle="#f6fbff";ctx.font=`700 ${Math.round(H*.018)}px -apple-system,system-ui,sans-serif`;ctx.fillText("Restart this boss battle",b.x+b.w/2,b.y+b.h*1.38);ctx.fillText("Press R for a full restart",b.x+b.w/2,b.y+b.h*1.72);ctx.restore();
}
function drawPortraitPrompt() {
  skyGradient("#102a56", "#246a8d");
  const u=W; ctx.save(); ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillStyle="rgba(246,251,255,.10)";ctx.beginPath();ctx.arc(W/2,H*.32,u*.26,0,7);ctx.fill();
  ctx.save();ctx.translate(W/2,H*.32);ctx.rotate(-Math.PI/2);ctx.strokeStyle="#ffd34d";ctx.lineWidth=u*.025;roundRect(-u*.17,-u*.28,u*.34,u*.56,u*.045);ctx.stroke();ctx.restore();
  ctx.fillStyle="#ffd34d";ctx.font=`900 ${Math.round(u*.105)}px -apple-system,system-ui,sans-serif`;ctx.fillText("TURN TO FLY!",W/2,H*.60);
  ctx.fillStyle="#f6fbff";ctx.font=`700 ${Math.round(u*.048)}px -apple-system,system-ui,sans-serif`;ctx.fillText("Rotate your phone sideways",W/2,H*.68);ctx.fillText("and Lachlan's adventure will begin.",W/2,H*.73);
  ctx.restore();
}

/* ------------------------------- Loop --------------------------------- */
let last = performance.now();
function frame(now) {
  let dt = (now - last) / 1000; last = now;
  if (dt > 0.05) dt = 0.05;
  if (isPortrait) {
    drawPortraitPrompt();
    requestAnimationFrame(frame);
    return;
  }
  // keep audio alive: browsers (or another app grabbing sound) can re-suspend
  // the context mid-game — nudge it back awake every frame so sound recovers
  if (AC && AC.state !== "running" && !muted) AC.resume();
  update(dt);

  ctx.save();
  if (shakeT > 0 && !reducedMotion) { const m = shakeT * H * 0.06; ctx.translate(rand(-m, m), rand(-m, m)); }
  drawBackground();
  drawStars();
  drawFish();
  drawPowerups();
  drawMissionItems();
  drawGusts();
  for (const r of rings) drawRing(r, "left");
  if (bossActive) drawBoss();
  drawPlayer();
  drawFriendlyShots();
  for (const r of rings) drawRing(r, "right");
  if (bossActive) drawShots();
  drawBirds();
  drawParticles();
  drawTexts();
  drawSnow();
  drawDust();
  ctx.restore();

  if(nearMissT>0&&!reducedMotion){ctx.save();ctx.globalAlpha=nearMissT*.5;ctx.strokeStyle="#ff7a45";ctx.lineWidth=H*.035;ctx.strokeRect(0,0,W,H);ctx.restore();}

  if (state === STATE.PLAYING) { drawScore(); drawBossMeter(); drawBossEntrance(); drawBanner(); drawBossHud(); drawFireButton(); drawTutorial(); drawDirectionControls(); if(mapT>0)drawJourneyMap(false); }
  else if (state === STATE.STORY) {
    drawStoryPanel();
  }
  else if (state === STATE.READY) {
    drawTitleScreen();
  } else if (state === STATE.WIN) {
    drawScore();
    const foes = { 1: "Captain Albatross's gun", 2: "the Gun Deck", 3: "the mighty Dreadnought" };
    panel(level >= 3 ? "YOU SAVED THE SKIES!" : "WORLD " + level + " CLEARED!", [
      { text: "You beat " + (foes[level] || foes[1]) + "!", color: "#ffd34d", big: true },
      { text: "Score: " + score, big: true },
      { text: "Best: " + best, color: "#ffd34d" },
      { text: level < 3 ? "WORLD " + (level + 1) + " UNLOCKED!" : "Every boss is beaten. Wow!", color: "#7fd0ff" },
      { text: "" },
      { text: "Tap to fly again" },
    ]);
    drawMissionSprite("festival",W*.82,H*.25,H*.24,-.08);
  } else if (state === STATE.OVER) {
    drawScore();
    panel("Game Over", [
      { text: "Score: " + score, big: true },
      { text: "Best: " + best, color: "#ffd34d" },
      { text: "" },
      { text: diedAtBoss ? "Your boss checkpoint is saved" : "Tap to play again", color: diedAtBoss ? "#ff8a3d" : "#fff" },
      { text: "" },
    ]);
    if(diedAtBoss)drawContinueBossButton();
  }
  requestAnimationFrame(frame);
}

resize();
reset();
requestAnimationFrame(frame);
</script>
